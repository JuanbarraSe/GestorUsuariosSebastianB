<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    </head>

    <body>
        <title>FORMULARIO</title>
        <form method="POST" action="{{url_for('login_form')}}">
            <h4>INGRESAR</h4>
            <div class="mb-3">
                <label>Usuario:</label>
                <input type="text" class="form-control" name="txtusuario" placeholder="Usuario">
            </div>
            <div class="mb-3">
                <label>Contraseña:</label>
                <input type="password" class="form-control" placeholder="Contraseña" name="txtcontraseña">
                <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Ingresar</button>
            </div>
            <div class="text-center">
                <button  class="btn btn-danger">Recordar contraseña</button>
            </div>
        </form>
    </body>
</html>
