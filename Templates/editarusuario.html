<html>
    <head>
        <title>Registro</title>
        <meta charset="UTF-8">
        <!---Llamar al estilo de la pagina-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    </head>
    <body class="container mt-5">
        <h2>EDITAR USUARIOS</h2>
        <form method="POST" action="{{url_for('actualizar_usuarios')}}">
            <input type="hidden" name="id" value="{{user[0]}}">
            <div class=" mb-3">
                <label>USUARIOS:</label>
                <input type="text" name="txtusuario" class="form-control" value="{{user[1]}}">
            </div>
            <div class="mb-3">
                <label>CONTRASEÑA:</label>
                <input type="password" name="txtpassword" class="form-control" value="{{user[2]}}">
            </div>
            <div class="mb-3">
                <label>ROL:</label>
                <input type="text" name="txtrol" class="form-control" value="{{user[3]}}" disabled>
            </div>
            <div class="mb-3">
                <label>DOCUMENTO:</label>
                <input type="text" name="txtdocumento" class="form-control" value="{{user[4]}}" disabled>
            </div>
            <button class="btn-primary">Actualizar</button>
        
        </form>
    </body>
</html>
