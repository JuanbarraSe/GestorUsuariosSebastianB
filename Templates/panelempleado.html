<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Empleado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">
    <h1>Perfil del Empleado</h1>

    <form action="{{ url_for('guardaractualizacion') }}" method="POST">
        <input type="hidden" name="id" value="{{ usuario[0] }}">

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text"class="form-control"name="txtnombre"value="{{ usuario[1] }}">
        </div>


        <div class="mb-3">
            <label>Apellido</label>
            <input type="text"class="form-control"name="txtapellido"value="{{ usuario[2] }}"
            >
        </div>

        <div class="mb-3">
            <label>Cargo</label>
            <input type="text"class="form-control"name="txtcargo"value="{{ usuario[3] }}">
        </div>

        <div class="mb-3">
            <label>Departamento</label>
            <select name="txtdepartamento" class="form-control" required>
                <option value="">Seleccione un departamento</option>
                <option value="1">Sistemas</option>
                <option value="2">Recursos Humanos</option>
                <option value="3">Contabilidad</option>
                <option value="4">Administración</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Actualizar Datos</button>

    </form>

    <hr>
    <div class="mb-3">
        Nombre: {{ usuario[1] }}
    </div>

    <div class="mb-3">
        Apellido: {{ usuario[2] }}
    </div>

    <div class="mb-3">
        Cargo: {{ usuario[3] }}
    </div>

    <div class="mb-3">
        Horas Extras: {{ usuario[4] }}
    </div>

    <div class="mb-3">
        Bonificación: {{ usuario[5] }}
    </div>

    <div class="mb-3">
        Salario Bruto: {{ usuario[6] }}
    </div>

    <div class="mb-3">
        Salud: {{ usuario[7] }}
    </div>

    <div class="mb-3">
        Pensión: {{ usuario[8] }}
    </div>

    <div class="mb-3">
        Salario Neto: {{ usuario[9] }}
    </div>

    <div class="mt-4">
        <a href="{{ url_for('salir') }}" class="btn btn-danger">
            Cerrar Sesión
        </a>
    </div>

</div>

</body>
</html>
