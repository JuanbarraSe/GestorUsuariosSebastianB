<!DOCTYPE html>
<html>
    <head>
        <title>Registro</title>
        <meta charset="UTF-8">
        <!---Llamar al estilo de la pagina-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

        <link rel="stylesheet" href="{{url_for('static',filename='style.css')}}">
    </head>


<body>
                <!--Creamos el modal-->
                <div class="modal" id="myModal2">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <!--definir el header-->
                            <div class="modal-header">
                                <h4 class="modal-title">REGISTRO DE EMPLEADOS</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <!--Definir el cuerpo del modal--formulario -->
                            <div class="modal-body">
                                <form method="POST" action="/registroemple">
                                    <div class="mb-3 mt-3">
                                        <label>Ingresar nombre del empleado</label>
                                        <input type="text" class="form-control" name="txtnombre" placeholder="Ingresar nombre">
                                    </div>
                                    <div class="mb-3">
                                        <label>Ingresar Apellido del empleado</label>
                                        <input type="text" class="form-control" placeholder="Ingresar apellido" name="txtapellido">
                                    </div>
                                    <div class="mb-3">
                                        <label>Ingresar documento</label>
                                        <input type="number" class="form-control" placeholder="Ingresar documento usuario" name="txtdocumento">
                                    </div>
                                    <div class="mb-3">
                                        <label>Cargo:</label>
                                        <select class="form-select" name="txtcargo" required>
                                            <option value="">Seleccione el cargo</option>
                                            <option value="administrador">Administrador</option>
                                            <option value="gerente">Gerente</option>
                                            <option value="contador">Contador</option>
                                        </select>
                                    </div>
                                    <div class="mb-3">
                                        <label>Bonificación</label>
                                        <input type="number" class="form-control" placeholder="Ingresar Bonificación" name="txtbonificacion">
                                    </div>
                                    <div class="mb-3">
                                        <label>Horas Extras</label>
                                        <input type="number" class="form-control" placeholder="Ingresar horas extras" name="txthorasExtras">
                                    </div>
                                    <div class="mb-3">
                                        <label>Ingresar el departamento</label>
                                        <input type="text" class="form-control" placeholder="Ingresar nombre del departamento" name="txtdepartamento">
                                    </div>
                                    <button type="submit" class="btn btn-success" data-bs-dismiss="modal">Registrar</button>
                                </form>
                            </div>
                            <!--definir el pie de pagina del formulario-->
                            <div class="modal-footer">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
